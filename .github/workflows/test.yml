name: 'Test'
on: [push, pull_request]

jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [windows-latest]
            fail-fast: false
        steps:
        - uses: actions/setup-go@v2
          with:
            go-version: '^1.13.1'
        - run: go version
        - name: clone
          run: |
            git clone https://github.com/eyalbe4/jfrog-cli.git
            git checkout test-win
            cd jfrog-cli
            go build/build.sh
              
