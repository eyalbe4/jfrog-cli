name: 'Test'
on: [push, pull_request]

jobs:
    test:
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [windows-latest]
            fail-fast: false
        steps:
        - uses: actions/setup-go@v2 
          with:
            go-version: '^1.13.1'
        - run: go version
        - name: clone
          run: |
            git clone https://github.com/eyalbe4/jfrog-cli.git
            cd jfrog-cli
            git checkout test-win
            build\build.bat
            .\jfrog -v
            .\jfrog c add def --url https://ecosysjfrog.jfrog.io/ --user eyalb --password AKCp5cckSN7LGLkQAmkWyMwqPSwesLJvjamxKQtzLfHTg6NJiSzxABdHLeMpiC2crZ2ECR9Za
            .\jfrog rt upload "testdata/a/*" "cli-tests-rt1-1625217683" --flat=false
            .\jfrog rt dl "cli-tests-rt-virtual-1625217683/testdata/(*)" "out/{1}" --flat=true
            dir out

